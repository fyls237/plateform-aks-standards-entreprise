name: "Terraform CI"

on:
  pull_request:
    branches: [main]
    paths:
      - "modules/**"
      - "environments/**"
      - "examples/**"
      - ".github/workflows/terraform-ci.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  format:
    name: "Format Check"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.12.0"

      - name: Terraform Format
        run: terraform fmt -recursive -check -diff

  validate:
    name: "Validate"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        directory:
          - modules/networking
          - modules/aks
          - modules/acr
          - modules/keyvault
          - modules/monitor
          - modules/identities
          - modules/log-analytics
          - modules/private-dns
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.12.0"

      - name: Terraform Init
        working-directory: ${{ matrix.directory }}
        run: terraform init -backend=false -input=false

      - name: Terraform Validate
        working-directory: ${{ matrix.directory }}
        run: terraform validate

  lint:
    name: "TFLint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Init TFLint
        run: tflint --init

      - name: Run TFLint (modules)
        run: |
          for dir in modules/*/; do
            echo "==> Linting $dir"
            tflint --chdir="$dir" --format=compact || true
          done

  security:
    name: "Checkov Security Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: modules/
          framework: terraform
          output_format: cli
          soft_fail: true
          quiet: true
